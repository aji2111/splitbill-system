version: '3.9'

services:

  postgres:
    image: postgres:16

    container_name: splitbill-postgres

    restart: always

    environment:
      POSTGRES_DB: split_bill
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

    networks:
      - splitbill-network

  auth-service:
    build:
      context: ./auth_service

    container_name: auth-service

    restart: always

    ports:
      - "8081:8081"

    depends_on:
      - postgres

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/split_bill
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres123

    networks:
      - splitbill-network

  expense-service:
    build:
      context: ./expense_service

    container_name: expense-service

    restart: always

    ports:
      - "8082:8082"

    depends_on:
      - postgres
      - auth-service

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/split_bill
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres123

      AUTH_SERVICE_URL: http://auth-service:8081

    networks:
      - splitbill-network

  settlement-service:
    build:
      context: ./settlement_service

    container_name: settlement-service

    restart: always

    ports:
      - "8083:8083"

    depends_on:
      - expense-service

    environment:
      EXPENSE_SERVICE_URL: http://expense-service:8082

    networks:
      - splitbill-network

volumes:
  postgres-data:

networks:
  splitbill-network:

